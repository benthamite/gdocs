name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/alphapapa/plz.el.git ../plz
          git clone --depth 1 https://github.com/magnars/dash.el.git ../dash
          git clone --depth 1 https://github.com/magnars/s.el.git ../s
          git clone --depth 1 https://github.com/magit/transient.git ../transient
          git clone --depth 1 https://github.com/tarsius/cond-let.git ../cond-let
          git clone --depth 1 https://github.com/tarsius/llama.git ../llama
      - name: Byte-compile
        run: make compile
      - name: Run tests
        run: make test
